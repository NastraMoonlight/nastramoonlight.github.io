<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Mouse Racing</title>
    <!-- Подключаем библиотеку для прямой связи игроков со стримером -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        #stream-view { display: none; position: relative; width: 1024px; height: 768px; margin: 0 auto; background: url('map.jpg') no-repeat; background-size: contain; }
        .player-token { position: absolute; width: 24px; height: 24px; background: #ff4757; border-radius: 50%; border: 2px solid white; transform: translate(-12px, -12px); font-size: 10px; line-height: 24px; text-shadow: 1px 1px 2px black; font-weight: bold; color: white; transition: all 0.3s ease; }
        #player-view { display: block; padding: 20px; }
        button { background: #2ed573; color: white; border: none; padding: 20px 40px; font-size: 24px; border-radius: 10px; cursor: pointer; display: none; width: 100%; max-width: 300px; margin: 20px auto; font-weight: bold; }
        input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- ЭКРАН СТРИМЕРА (Для OBS) -->
    <div id="stream-view">
        <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:10px; border-radius:5px;">
            Панель OBS (Управление раундами на кнопку Space/Пробел)
        </div>
    </div>

    <!-- ЭКРАН ЗРИТЕЛЯ (Для телефонов) -->
    <div id="player-view">
        <div id="login-box">
            <h3>Введите ваш ник на Twitch:</h3>
            <input type="text" id="username" placeholder="Ваш ник...">
            <br>
            <button id="join-btn" style="display:inline-block; font-size:18px; padding:10px 20px;">Войти в игру</button>
        </div>
        <div id="game-box" style="display:none;">
            <h2 id="status">Ожидаем команды стримера...</h2>
            <button id="click-btn">ЖМЯКАЙ!!!</button>
            <p>Вы находитесь на клетке: <span id="current-cell">1</span></p>
        </div>
    </div>

    <script>
        // Секретный ID комнаты на основе вашего домена
        const ROOM_ID = "nastramoonlight_eve_game";
        const isStreamer = window.innerWidth > 1000;
        
        const coords = {
            1:[675,595], 2:[800,615], 3:[870,485], 4:[815,385], 5:[740,320],
            6:[835,285], 7:[910,235], 8:[820,140], 9:[640,260], 10:[630,165],
            11:[710,100], 12:[575,100], 13:[480,130], 14:[375,130], 15:[265,160],
            16:[185,200], 17:[120,290], 18:[160,400], 19:[270,410], 20:[250,520],
            21:[170,575], 22:[170,695], 23:[265,735], 24:[315,620], 25:[390,665],
            26:[475,755], 27:[575,755], 28:[600,615]
        };

        let players = {};
        let myName = "";
        let myConnection;

        if (isStreamer) {
            // ЛОГИКА ДЛЯ СТРИМЕРА (ПРИЕМ СИГНАЛОВ)
            document.getElementById('stream-view').style.display = 'block';
            document.getElementById('player-view').style.display = 'none';

            const peer = new Peer(ROOM_ID);
            let activeConnections = [];

            peer.on('connection', (conn) => {
                activeConnections.push(conn);
                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        if (!players[data.name]) {
                            players[data.name] = { position: 1, isTrapped: false };
                        }
                        updateMapVisuals();
                    }
                    if (data.type === 'click') {
                        handlePlayerMove(data.name);
                    }
                });
            });

            // Запуск раунда кнопкой "Пробел" в OBS
            window.addEventListener('keydown', (e) => {
                if (e.code === "Space") {
                    activeConnections.forEach(c => c.send({ type: 'start_round', duration: 4000 }));
                }
            });

            function handlePlayerMove(name) {
                let p = players[name];
                if (!p || p.position >= 28) return;
                
                if (p.isTrapped) { p.isTrapped = false; return; }
                let steps = (p.position === 7) ? 2 : 1;
                p.position += steps;

                if (p.position === 6) p.position = 3;
                if (p.position === 14) p.position = 13;
                if (p.position === 24) p.isTrapped = true;
                if (p.position > 28) p.position = 28;

                updateMapVisuals();
                activeConnections.forEach(c => c.send({ type: 'sync_pos', name: name, pos: p.position }));
            }

            function updateMapVisuals() {
                const view = document.getElementById('stream-view');
                // Удаляем старые фишки, кроме плашки инфо
                document.querySelectorAll('.player-token').forEach(e => e.remove());
                
                Object.keys(players).forEach(name => {
                    const p = players[name];
                    const token = document.createElement('div');
                    token.className = 'player-token';
                    token.innerText = name.substring(0, 2).toUpperCase();
                    token.style.left = coords[p.position][0] + 'px';
                    token.style.top = coords[p.position][1] + 'px';
                    view.appendChild(token);
                });
            }

        } else {
            // ЛОГИКА ДЛЯ ЗРИТЕЛЕЙ (ОТПРАВКА СИГНАЛОВ)
            const peer = new Peer();
            
            document.getElementById('join-btn').onclick = () => {
                myName = document.getElementById('username').value.trim();
                if(myName) {
                    myConnection = peer.connect(ROOM_ID);
                    myConnection.on('open', () => {
                        myConnection.send({ type: 'join', name: myName });
                        document.getElementById('login-box').style.display = 'none';
                        document.getElementById('game-box').style.display = 'block';
                    });

                    myConnection.on('data', (data) => {
                        if (data.type === 'start_round') {
                            runMiniGame(data.duration);
                        }
                        if (data.type === 'sync_pos' && data.name === myName) {
                            document.getElementById('current-cell').innerText = data.pos;
                        }
                    });
                }
            };

            function runMiniGame(duration) {
                const btn = document.getElementById('click-btn');
                const status = document.getElementById('status');
                status.innerText = "БЫСТРО ЖМИ КНОПКУ!";
                btn.style.display = 'block';

                let clicked = false;
                btn.onclick = () => {
                    if (!clicked) {
                        clicked = true;
                        myConnection.send({ type: 'click', name: myName });
                        btn.style.display = 'none';
                        status.innerText = "Успешно! Ждем результатов раунда...";
                    }
                };

                setTimeout(() => {
                    btn.style.display = 'none';
                    if (!clicked) status.innerText = "Вы не успели нажаться!";
                }, duration);
            }
        }
    </script>
</body>
</html>
