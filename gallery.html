<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея | NastraMoonlight VTuber Space</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-color: #0c0a18;
            --panel-bg: rgba(18, 14, 36, 0.85);
            --accent-gold: #f1fa8c; 
            --accent-pink: #ff79c6;
            --accent-purple: #bd93f9;
            --border-gold: rgba(241, 250, 140, 0.35);
            --text-color: #f8f8f2;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(12, 10, 24, 0.5), rgba(12, 10, 24, 0.9)), url('images/main-bg.jpg');
            background-size: cover; background-position: center center; background-attachment: fixed;
        }

        header {
            padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--accent-gold);
            box-shadow: 0 5px 25px rgba(241, 250, 140, 0.15); background: rgba(12, 10, 24, 0.9);
        }

        header h1 { margin: 0; font-size: 2.5em; color: var(--accent-gold); text-shadow: 0 0 15px rgba(241, 250, 140, 0.6); text-transform: uppercase; }
        
        .back-btn {
            display: inline-block; margin-top: 15px; background: rgba(255, 255, 255, 0.05);
            color: var(--text-color); padding: 8px 16px; text-decoration: none; border-radius: 6px;
            border: 1px solid var(--accent-purple); font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent-purple); color: #120e24; box-shadow: 0 0 15px var(--accent-purple); transform: translateY(-2px); }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
        }

        .gallery-card {
            background: var(--panel-bg); border: 2px solid var(--border-gold); border-radius: 12px;
            overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.4); transition: 0.3s ease-in-out; cursor: pointer;
        }
        .gallery-card:hover { transform: scale(1.03); border-color: var(--accent-pink); box-shadow: 0 0 20px rgba(255, 121, 198, 0.4); }

        .img-container { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background-color: #080610; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; transition: 0.4s; }
        .gallery-card:hover .img-container img { transform: scale(1.05); }

        .gallery-info { padding: 10px; text-align: center; background: rgba(12, 10, 24, 0.6); font-size: 0.9em; color: var(--accent-gold); border-top: 1px solid var(--border-gold); }

        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 10, 24, 0.95); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .lightbox.active { display: flex; }
        .lightbox-img { max-width: 95%; max-height: 90%; border-radius: 6px; border: 2px solid var(--accent-gold); box-shadow: 0 0 30px rgba(241, 250, 140, 0.3); object-fit: contain; }
        .lightbox-close { position: absolute; top: 15px; right: 25px; color: var(--accent-pink); font-size: 2.5em; cursor: pointer; transition: 0.3s; }
        .lightbox-close:hover { transform: scale(1.2); text-shadow: 0 0 15px var(--accent-pink); }
    </style>
</head>
<body>
    <header>
        <h1>🌙 Лунная Галерея</h1>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> На главную</a>
    </header>

    <div class="container">
        <div class="gallery-grid">
            <!-- Чтобы добавить новые арты, просто скопируй этот блок и поменяй имя картинки -->
            <div class="gallery-card" onclick="openLightbox('gallery-images/art1.jpg')">
                <div class="img-container"><img src="gallery-images/art1.jpg" alt="Art 1"></div>
                <div class="gallery-info"><span>Основной арт</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox('gallery-images/eve1.jpg')">
                <div class="img-container"><img src="gallery-images/eve1.jpg" alt="EVE 1"></div>
                <div class="gallery-info"><span>Флот в нулях</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox('gallery-images/art2.jpg')">
                <div class="img-container"><img src="gallery-images/art2.jpg" alt="Art 2"></div>
                <div class="gallery-info"><span>Чиби модель</span></div>
            </div>
            <div class="gallery-card" onclick="openLightbox('gallery-images/eve2.jpg')">
                <div class="img-container"><img src="gallery-images/eve2.jpg" alt="EVE 2"></div>
                <div class="gallery-info"><span>Jita 4-4</span></div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Полноэкранный просмотр">
    </div>

    <script>
                async function loadAllImages() {
            try {
                // Читаем готовый список, созданный роботом
                const response = await fetch('images.json');
                if (!response.ok) throw new Error('Список не найден');
                const images = await response.json();

                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = ''; 

                if(images.length === 0) {
                    grid.innerHTML = '<div style="color: #aaa; text-align: center; grid-column: 1/-1;">Папка gallery-images пока пуста...</div>';
                    return;
                }

                images.forEach(imgName => {
                    const card = document.createElement('div');
                    card.className = 'gallery-card';
                    const directUrl = `gallery-images/${imgName}`;
                    
                    card.onclick = () => openLightbox(directUrl);

                    // Красиво убираем расширение .png или .jpg из названия подписи
                    const cleanName = imgName.replace(/\.[^/.]+$/, "");

                    card.innerHTML = `
                        <div class="img-container">
                            <img src="${directUrl}" alt="${imgName}">
                        </div>
                        <div class="gallery-info">
                            <span>${cleanName}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (e) {
                document.getElementById('gallery-grid').innerHTML = '<div style="color: #ff79c6; text-align: center; grid-column: 1/-1;">Закиньте первую картинку в папку gallery-images, чтобы активировать галерею.</div>';
                console.error(e);
            }
        }

        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        window.addEventListener('DOMContentLoaded', loadAllImages);

    </script>
</body>
</html>
